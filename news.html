<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Center - UAE ROYAL CAPITAL</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. CORE VARIABLES & RESET --- */
        :root { 
            --bg-color: #FAFAF5; 
            --royal-gold: #C5A059; 
            --deep-navy: #0E1E35; 
            --text-body: #4A5568; 
            --font-serif: 'Playfair Display', serif; 
            --font-sans: 'Montserrat', sans-serif; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: var(--font-sans); 
            background: var(--bg-color); 
            color: var(--text-body); 
            margin: 0; 
            line-height: 1.7; 
            background-image: radial-gradient(#C5A059 0.5px, transparent 0.5px), radial-gradient(#C5A059 0.5px, #FAFAF5 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }

        /* --- 2. NAVBAR --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            padding: 0 max(5%, calc((100% - 1200px) / 2)); 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.05); transition: 0.4s;
            box-sizing: border-box;
        }

        .logo {
            font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; color: var(--deep-navy);
            letter-spacing: 1px; display: flex; align-items: center; gap: 10px; z-index: 1001;
        }
        .logo img { height: 45px; width: auto; object-fit: contain; }

        /* 菜单容器 */
        .nav-container { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--deep-navy);
            font-weight: 500; position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0;
            background-color: var(--royal-gold); transition: 0.3s;
        }
        .nav-links a:hover::after { width: 100%; }

        .btn-donate {
            background: var(--deep-navy); color: #fff; padding: 10px 25px; font-weight: 600;
            border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--deep-navy);
            font-size: 0.8rem;
        }
        .btn-donate:hover { background: #fff; color: var(--deep-navy); border-color: var(--royal-gold); }

        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1001; }
        .bar { width: 25px; height: 3px; background-color: var(--deep-navy); transition: 0.4s; }

        /* --- 3. HERO SECTION --- */
        .sub-hero {
            height: 45vh; margin-top: 80px;
            /* 背景图片 */
            background: linear-gradient(rgba(14, 30, 53, 0.66), rgba(14, 30, 53, 0.82)), url('images/news-hero-ai.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center;
        }
        .sub-hero h1 { font-family: var(--font-serif); font-size: 3.5rem; color: var(--royal-gold); margin-bottom: 10px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .sub-hero p { font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; color: #e0e0e0; max-width: 600px; }

        /* --- 4. NEWS CONTAINER --- */
        .news-container { max-width: 1000px; margin: -50px auto 4rem auto; padding: 0 20px; position: relative; z-index: 2; }
        
        /* 筛选栏 */
        .news-filter-bar {
            background: rgba(255,255,255,0.96);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 12px 34px rgba(14,30,53,0.08);
            border: 1px solid rgba(197,160,89,0.18);
            display: grid;
            gap: 18px;
            margin-bottom: 3rem;
        }
        .filter-group {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
        }
        .filter-btn {
            appearance: none;
            cursor: pointer;
            font: 700 0.84rem var(--font-sans);
            color: #6f7682;
            background: #fbfaf6;
            border: 1px solid rgba(197,160,89,0.24);
            border-radius: 7px;
            padding: 11px 12px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
        }
        .filter-btn:hover {
            color: #8b5e17;
            background: rgba(197,160,89,0.13);
            border-color: rgba(197,160,89,0.52);
            box-shadow: 0 8px 20px rgba(14,30,53,0.07);
            transform: translateY(-1px);
        }
        .filter-btn.active {
            color: #fff;
            background: linear-gradient(135deg, var(--deep-navy), #173656);
            border-color: var(--royal-gold);
            box-shadow: 0 10px 24px rgba(14,30,53,0.18);
        }
        .filter-btn:focus-visible {
            outline: 2px solid var(--royal-gold);
            outline-offset: 3px;
        }
        
        .search-box {
            width: min(100%, 520px);
            display: flex;
            align-items: center;
            background: #f5f3ed;
            padding: 0 15px;
            border-radius: 7px;
            border: 1px solid rgba(197,160,89,0.22);
            transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .search-box:focus-within {
            border-color: var(--royal-gold);
            background: #fff;
            box-shadow: 0 8px 20px rgba(14,30,53,0.07);
        }
        .search-box input { border: none; background: transparent; outline: none; font-size: 0.9rem; width: 100%; height: 44px; color: var(--deep-navy); }
        .search-box i { color: #8b5e17; cursor: pointer; margin-right: 8px; }

        /* 新闻列表 */
        .news-list { display: flex; flex-direction: column; gap: 2rem; min-height: 400px; }

        .news-item {
            background: #fff; display: flex; border-radius: 6px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.4s ease; 
            opacity: 0; animation: fadeUp 0.6s ease forwards;
        }
        .news-item:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(14, 30, 53, 0.1); border-color: rgba(197, 160, 89, 0.3); }

        .news-thumb { width: 35%; min-width: 280px; position: relative; overflow: hidden; }
        .news-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .news-item:hover .news-thumb img { transform: scale(1.05); }
        
        .category-tag {
            position: absolute; top: 15px; left: 15px; background: var(--royal-gold); color: #fff;
            padding: 4px 10px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; border-radius: 2px;
        }

        .news-content { padding: 2.5rem; width: 65%; display: flex; flex-direction: column; justify-content: center; }
        .news-meta { display: flex; gap: 15px; font-size: 0.85rem; color: #999; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .news-meta i { color: var(--royal-gold); margin-right: 5px; }
        .news-title { font-family: var(--font-serif); font-size: 1.6rem; color: var(--deep-navy); margin: 0 0 1rem 0; line-height: 1.3; font-weight: 700; }
        .news-title a:hover { color: var(--royal-gold); }
        .news-excerpt { font-size: 1rem; color: #555; margin-bottom: 1.5rem; line-height: 1.6; }

        .keyword-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.2rem; }
        .keyword-tag {
            background: rgba(197, 160, 89, 0.12); color: var(--deep-navy); border: 1px solid rgba(197, 160, 89, 0.22);
            padding: 4px 9px; border-radius: 999px; font-size: 0.74rem; font-weight: 600;
        }
        
        .read-more-link {
            display: inline-flex; align-items: center; gap: 8px; color: var(--deep-navy);
            font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid transparent; width: fit-content;
        }
        .read-more-link:hover { color: var(--royal-gold); gap: 12px; }

        .no-results { text-align: center; color: #888; font-size: 1.2rem; padding: 2rem; width: 100%; }

        /* 分页器 */
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 4rem; }
        .page-btn { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #ddd; background: #fff; color: var(--text-body); cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .page-btn.active { background: var(--deep-navy); color: #fff; border-color: var(--deep-navy); }
        .page-btn:hover:not(.active) { border-color: var(--royal-gold); color: var(--royal-gold); }
        .page-btn.disabled { opacity: 0.5; cursor: not-allowed; }

        footer { background: #050A10; color: #fff; text-align: center; padding: 2rem; margin-top: 4rem; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* 移动端适配 */
        @media(max-width: 900px) {
            .navbar { padding: 0 1.5rem; height: 70px; }
            .logo { font-size: 1.1rem; }
            .hamburger { display: flex; }
            .nav-container {
                position: fixed; top: 70px; left: 0; width: 100%; background-color: #fff;
                flex-direction: column; align-items: center; padding: 2rem 0;
                border-bottom: 2px solid var(--royal-gold); box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                transform: translateY(-150%); transition: transform 0.5s ease; z-index: 1000;
            }
            .nav-container.active { transform: translateY(0); }
            .nav-links { flex-direction: column; gap: 20px; width: 100%; text-align: center; }
            .nav-links a { font-size: 1rem; display: block; padding: 10px 0; width: 100%; }
            .btn-donate { width: 80%; text-align: center; margin-top: 20px; }
            .hamburger.active .bar:nth-child(1) { transform: rotate(-45deg) translate(-5px, 6px); }
            .hamburger.active .bar:nth-child(2) { opacity: 0; }
            .hamburger.active .bar:nth-child(3) { transform: rotate(45deg) translate(-5px, -6px); }

            .sub-hero h1 { font-size: 2.2rem; }
            .filter-group { grid-template-columns: repeat(2, minmax(0, 1fr)); width: 100%; }
            .search-box { width: 100%; }
            .search-box input { width: 100%; }
            .news-item { flex-direction: column; }
            .news-thumb { width: 100%; height: 220px; }
            .news-content { width: 100%; padding: 1.5rem; }
            .news-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Logo"> 
            UAE ROYAL CAPITAL
        </a>

        <div class="hamburger" id="hamburger-btn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <div class="nav-container" id="nav-menu">
            <div class="nav-links">
                <a href="index.html" onclick="closeMenu()">Home</a>
                <a href="about.html" onclick="closeMenu()">About Us</a>
                <a href="index.html#investment" onclick="closeMenu()">Investment</a>
                <a href="index.html#team" onclick="closeMenu()">Leadership</a>
                <a href="news.html" style="color:var(--royal-gold)" onclick="closeMenu()">News Center</a>
                <a href="careers.html" onclick="closeMenu()">Careers</a>
                <a href="contact.html" onclick="closeMenu()">Contact</a>
            </div>
            <a href="donate.html" class="btn-donate" onclick="closeMenu()">Donate</a>
        </div>
    </nav>

    <!-- 顶部 Hero -->
    <div class="sub-hero">
        <h1>Global News & Updates</h1>
        <p>Stay informed with the latest developments from our investment portfolio and royal initiatives.</p>
    </div>

    <div class="news-container">
        
        <!-- 筛选 & 搜索栏 -->
        <div class="news-filter-bar">
            <div class="filter-group" id="category-filters">
                <button class="filter-btn active" type="button" data-category="All">All News</button>
                <button class="filter-btn" type="button" data-category="Technology">Technology</button>
                <button class="filter-btn" type="button" data-category="Economy">Economy</button>
                <button class="filter-btn" type="button" data-category="Tourism">Tourism</button>
                <button class="filter-btn" type="button" data-category="Energy Policy">Energy Policy</button>
                <button class="filter-btn" type="button" data-category="Trade">Trade</button>
                <button class="filter-btn" type="button" data-category="Entrepreneurship">Entrepreneurship</button>
                <button class="filter-btn" type="button" data-category="Macro Economy">Macro Economy</button>
                <button class="filter-btn" type="button" data-category="Aviation">Aviation</button>
                <button class="filter-btn" type="button" data-category="Royal Activities">Royal Activities</button>
                <button class="filter-btn" type="button" data-category="Infrastructure">Infrastructure</button>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search keywords, source, title...">
            </div>
        </div>

        <!-- 新闻列表容器 (由 JS 填充) -->
        <div id="news-list-container" class="news-list"></div>

        <!-- 分页器 (由 JS 逻辑控制) -->
        <div id="pagination-container" class="pagination"></div>

    </div>

    <footer><p>© 2026 UAE Royal Capital Funding. All Rights Reserved.</p></footer>

    <script src="data/news-data.js"></script>
    <script>
        const newsData = [...(window.siteNews || [])];

        const itemsPerPage = 6; 
        let currentPage = 1;
        let currentCategory = 'All';
        let searchQuery = '';
        let filteredData = [];

        // DOM 元素
        const newsContainer = document.getElementById('news-list-container');
        const paginationContainer = document.getElementById('pagination-container');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const searchInput = document.getElementById('search-input');

        // --- 3. 初始化 ---
        function init() {
            newsData.sort((a, b) => new Date(b.date) - new Date(a.date));
            applyFilters(); 
        }

        // --- 4. 筛选逻辑 ---
        function applyFilters() {
            filteredData = newsData.filter(item => {
                const matchesCategory = currentCategory === 'All' || item.category === currentCategory;
                const keywords = (item.keywords || []).join(' ');
                const source = item.source || '';
                const searchableText = `${item.title} ${item.excerpt} ${item.category} ${keywords} ${source} ${item.displayDate}`.toLowerCase();
                const searchTerms = searchQuery.toLowerCase().trim().split(/\s+/).filter(Boolean);
                const matchesSearch = searchTerms.length === 0 || searchTerms.every(term => searchableText.includes(term));
                return matchesCategory && matchesSearch;
            });
            currentPage = 1;
            renderNews();
            renderPagination();
        }

        // --- 5. 渲染新闻列表 ---
        function renderNews() {
            newsContainer.innerHTML = ''; 
            if (filteredData.length === 0) {
                newsContainer.innerHTML = '<div class="no-results">No news found matching your criteria.</div>';
                return;
            }
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);

            pageData.forEach((item, index) => {
                const delay = index * 0.1;
                const keywordHtml = (item.keywords || []).slice(0, 4).map(keyword => `<span class="keyword-tag">${keyword}</span>`).join('');
                const html = `
                    <article class="news-item" style="animation-delay: ${delay}s;">
                        <div class="news-thumb">
                            <span class="category-tag">${item.category}</span>
                            <a href="${item.link}">
                                <img src="${item.image}" alt="${item.title}">
                            </a>
                        </div>
                        <div class="news-content">
                            <div class="news-meta">
                                <span><i class="fa-regular fa-calendar"></i> ${item.displayDate}</span>
                                <span><i class="fa-regular fa-folder-open"></i> ${item.category}</span>
                            </div>
                            <h3 class="news-title">
                                <a href="${item.link}">${item.title}</a>
                            </h3>
                            <p class="news-excerpt">${item.excerpt}</p>
                            <div class="keyword-tags">${keywordHtml}</div>
                            <a href="${item.link}" class="read-more-link">Read Full Article <i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </article>
                `;
                newsContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        // --- 6. 渲染分页器 ---
        function renderPagination() {
            paginationContainer.innerHTML = '';
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (totalPages <= 1) return; 

            const prevBtn = document.createElement('div');
            prevBtn.className = `page-btn ${currentPage === 1 ? 'disabled' : ''}`;
            prevBtn.innerHTML = '<i class="fa-solid fa-angle-left"></i>';
            prevBtn.onclick = () => changePage(currentPage - 1);
            paginationContainer.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('div');
                btn.className = `page-btn ${currentPage === i ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => changePage(i);
                paginationContainer.appendChild(btn);
            }

            const nextBtn = document.createElement('div');
            nextBtn.className = `page-btn ${currentPage === totalPages ? 'disabled' : ''}`;
            nextBtn.innerHTML = '<i class="fa-solid fa-angle-right"></i>';
            nextBtn.onclick = () => changePage(currentPage + 1);
            paginationContainer.appendChild(nextBtn);
        }

        // --- 7. 切换页码 ---
        function changePage(page) {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderNews();
            renderPagination();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        // --- 8. 事件监听 ---
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.getAttribute('data-category');
                applyFilters();
            });
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applyFilters();
        });

        const hamburger = document.getElementById('hamburger-btn');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
        function closeMenu() {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
        }

        // 启动
        init();
    </script>
</body>
</html>
